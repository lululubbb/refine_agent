[DEFAULT]
test_number     = 5
process_number  = 8

; ★ 路径约定（与 ChatUniTest 完全相同）
; dataset_dir   = export_data 导出的待测方法 JSON 所在目录（具体到项目子目录）
; result_dir    = LLM 生成结果的父目录（scope_test% 目录会自动创建在此下）
; project_dir   = 当前要测试的 Maven 项目根目录（已 checkout 并编译）
dataset_dir  = ../dataset_batch/Csv_1_b
result_dir   = ../results_batch/Csv_1_b
project_dir  = ../defect4j_projects/Csv_1_b

max_rounds      = 3
TIMEOUT         = 30
MAX_PROMPT_TOKENS = 3000
MIN_ERROR_TOKENS  = 500

PROMPT_TEMPLATE_NO_DEPS = d1_4.jinja2
PROMPT_TEMPLATE_DEPS    = d3_4.jinja2
PROMPT_TEMPLATE_REFINE  = refine_agent.jinja2
PROMPT_TEMPLATE_FIX     = refine_fix.jinja2

LANGUAGE     = java
GRAMMAR_FILE = ./dependencies/tree-sitter-java/java-grammar.so
COBERTURA_DIR= ./dependencies/cobertura-2.1.1
JUNIT_JAR    = ./dependencies/lib/junit-platform-console-standalone-1.9.2.jar
MOCKITO_JAR  = ./dependencies/lib/mockito-core-3.12.4.jar:./dependencies/lib/mockito-inline-3.12.4.jar:./dependencies/lib/mockito-junit-jupiter-3.12.4.jar:./dependencies/lib/byte-buddy-1.14.4.jar:./dependencies/lib/byte-buddy-agent-1.14.4.jar:./dependencies/lib/objenesis-3.3.jar
LOG4J_JAR    = ./dependencies/lib/slf4j-api-1.7.5.jar:./dependencies/lib/slf4j-log4j12-1.7.12.jar:./dependencies/lib/log4j-1.2.17.jar
JACOCO_AGENT = ./dependencies/jacoco/jacocoagent.jar
JACOCO_CLI   = ./dependencies/jacoco/jacococli.jar
REPORT_FORMAT = xml

; ── Generator LLM（闭源，负责生成和精修 Test）─────────────────────────
[generator]
provider    = openai
api_key     = sk-xxxx
model       = gpt-4o
temperature = 0.7
max_tokens  = 4096
base_url    = https://api.openai.com/v1

; ── Refiner Agent LLM（开源/本地，负责多维评估 + 指令生成）──────────
[refiner]
provider    = openai
api_key     = sk-xxxx
model       = gpt-4o-mini
temperature = 0.2
max_tokens  = 4096
base_url    = https://api.openai.com/v1
; 使用本地 Ollama：
; api_key   = ollama
; model     = llama3:70b
; base_url  = http://127.0.0.1:11434/v1

[database]
host     = 127.0.0.1
port     = 3306
database = chatunitest
user     = root
password = xxxxxx

